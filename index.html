<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - APP DIST</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>

  <style>
    :root {
      --bg-color: #0b141d;
      --card-color: #14212d;
      --accent-color: #003366;
      --text-color: #ffffff;
      --muted-text: #a0aec0;
      --border-color: #2c3e50;
      --hover-color: #f39c12;
      --danger-color: #e74c3c;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-wrapper {
      background: var(--card-color);
      padding: 40px 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .logo-container {
      background: white;
      padding: 15px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .logo-container img {
      width: 160px;
      display: block;
    }

    .login-title {
      margin: 0 0 20px 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group i.icon-left {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-text);
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px 12px 40px;
      box-sizing: border-box;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-color);
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #3498db;
    }

    .btn-toggle-pass {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted-text);
      padding: 0;
    }

    .btn-enviar {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-enviar:hover {
      background: var(--hover-color);
    }

    .btn-enviar:disabled {
      background: #34495e;
      cursor: not-allowed;
    }

    .error-message {
      color: var(--danger-color);
      font-size: 13px;
      margin-top: 15px;
      display: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-wrapper">

    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo UTCD">
    </div>

    <h2 class="login-title">ACCESO APP DIST</h2>

    <div class="input-group">
      <i class="fas fa-user icon-left"></i>
      <input type="text" id="user" placeholder="Usuario" autocomplete="off">
    </div>

    <div class="input-group">
      <i class="fas fa-lock icon-left"></i>
      <input type="password" id="pass" placeholder="Contraseña">
      <button type="button" class="btn-toggle-pass" onclick="togglePassword()">
        <i class="fas fa-eye" id="eye-icon"></i>
      </button>
    </div>

    <button class="btn-enviar" id="btn-login" onclick="iniciarSesion()">
      <span>INICIAR SESIÓN</span>
      <i class="fas fa-sign-in-alt"></i>
    </button>

    <div id="mensaje-error" class="error-message"></div>

  </div>

  <script>
    function togglePassword() {
      const p = document.getElementById("pass");
      const icon = document.getElementById("eye-icon");

      if (p.type === "password") {
        p.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        p.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    async function iniciarSesion() {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const btn = document.getElementById("btn-login");
      const errorMsg = document.getElementById("mensaje-error");

      if (!user || !pass) {
        errorMsg.innerText = "Por favor, completa usuario y contraseña.";
        errorMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando...';
      errorMsg.style.display = "none";

      const datosJSON = {
        action: "login",
        user: user,
        pass: pass
      };

      try {
        const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
          method: "POST",
          mode: "cors",
          body: JSON.stringify(datosJSON)
        });

        const data = await response.json();

        if (data.acceso) {
          sessionStorage.setItem("usuario", data.usuario);
          sessionStorage.setItem("tipo_usuario", data.tipo_usuario);
          sessionStorage.setItem("sector", data.sector);
          sessionStorage.setItem("cuadrilla", data.cuadrilla || "");

          window.location.href = "menu.html";
        } else {
          errorMsg.innerText = data.error || "Usuario o contraseña incorrectos.";
          errorMsg.style.display = "block";
        }

      } catch (error) {
        console.error("Error en login:", error);
        errorMsg.innerText = "Error de conexión. Revisa la URL del Apps Script.";
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>INICIAR SESIÓN</span><i class="fas fa-sign-in-alt"></i>';
      }
    }

    document.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        iniciarSesion();
      }
    });
  </script>

</body>
</html>
