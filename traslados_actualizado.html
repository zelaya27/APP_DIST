<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Traslados - APP DIST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="traslados.css">
  <script src="config.js"></script>
</head>
<body>
<header>
  <div class="header-row">
    <button class="btn-back-header" onclick="volverListaSeguro()"><i class="fas fa-arrow-left"></i></button>
    <h1 class="header-title" id="tituloPantalla">TRASLADOS</h1>
    <i class="fas fa-right-left header-icon"></i>
  </div>
  <div class="header-sub"><span id="nombreUsuarioHeader">Usuario</span> | <span id="nombreSectorHeader">Sector</span></div>
</header>

<div class="container">
  <div class="steps">
    <div class="step-ind active" id="ind-1"><div class="step-circle">1</div>Datos</div>
    <div class="step-ind" id="ind-2"><div class="step-circle">2</div>Materiales</div>
    <div class="step-ind" id="ind-3"><div class="step-circle">3</div>Firmas</div>
  </div>

  <form id="formTraslado">
    <section class="step-content activo" id="step-1">
      <div class="card">
        <h3><i class="fas fa-clipboard-list"></i> Datos generales</h3>
        <div class="form-grid">
          <div class="form-group"><label>ID traslado</label><input id="col_0" readonly></div>
          <div class="form-group"><label>Estado</label><input id="col_3" readonly></div>
          <div class="form-group"><label>Tipo</label><select id="col_23"><option value="Incidencias" selected>Incidencias</option><option value="Operaciones">Operaciones</option><option value="Mantenimiento">Mantenimiento</option></select></div>
          <div class="form-group"><label>Sector</label><input id="col_1" readonly></div>
          <div class="form-group"><label>Usuario</label><input id="col_2" readonly></div>
          <div class="form-group"><label>Fecha solicitud</label><input type="date" id="col_8" readonly></div>
          <div class="form-group"><label>Solicitante</label><input id="col_9" readonly></div>

          <div class="form-group full"><label>Cuadrilla que entrega</label><input id="col_4" class="selector" readonly onclick="abrirSelectorCuadrillaEntrega()" placeholder="Seleccione cuadrilla entrega..."></div>
          <div class="form-group"><label>ID cuadrilla entrega</label><input id="col_5" readonly></div>

          <div class="form-group full"><label>Cuadrilla que recibe</label><input id="col_6" class="selector" readonly onclick="abrirSelectorCuadrillaRecibe()" placeholder="Seleccione cuadrilla recibe..."></div>
          <div class="form-group"><label>ID cuadrilla recibe</label><input id="col_7" readonly></div>
        </div>
      </div>
    </section>

    <section class="step-content" id="step-2">
      <div class="card">
        <h3><i class="fas fa-boxes-stacked"></i> Materiales a trasladar</h3>
        <div id="listaMaterialesTraslado"></div>
        <button type="button" class="btn btn-main btn-full" onclick="abrirModalMaterialTraslado()"><i class="fas fa-plus"></i> Agregar material</button>
      </div>
    </section>

    <section class="step-content" id="step-3">
      <div class="card">
        <h3><i class="fas fa-signature"></i> Firmas y cierre</h3>
        <div class="form-grid">
          <div class="form-group"><label>Fecha preparación</label><input type="date" id="col_10" readonly></div>
          <div class="form-group"><label>Supervisor / prepara</label><input id="col_11" readonly></div>
          <input type="hidden" id="col_12">
          <div class="form-group"><label>Fecha recibido</label><input type="date" id="col_13" readonly></div>
          <div class="form-group"><label>Recibido por</label><input id="col_14" readonly></div>
          <input type="hidden" id="col_15">
          <input type="hidden" id="col_16">
          <input type="hidden" id="col_17"><input type="hidden" id="col_18"><input type="hidden" id="col_19">
          <input type="hidden" id="col_20"><input type="hidden" id="col_21"><input type="hidden" id="col_22">
        </div>

        <div id="boxFirmaPrep" style="display:none;margin-top:12px;">
          <button type="button" class="btn btn-blue btn-full" onclick="abrirModalFirma('preparacion')"><i class="fas fa-pen-nib"></i> Firma preparación</button>
          <div class="firma-preview" id="previewFirmaPrep">Sin firma de preparación</div>
        </div>

        <div id="boxFirmaRec" style="display:none;margin-top:12px;">
          <button type="button" class="btn btn-green btn-full" onclick="abrirModalFirma('recibido')"><i class="fas fa-signature"></i> Firma recibido</button>
          <div class="firma-preview" id="previewFirmaRec">Sin firma de recibido</div>
        </div>

        <button type="button" class="btn btn-main btn-full" id="btnGuardarTraslado" onclick="guardarTraslado()"><i class="fas fa-save"></i> Guardar traslado</button>
        <button type="button" class="btn btn-red btn-full" id="btnGenerarPDF" onclick="generarPDFTraslado()" style="display:none;"><i class="fas fa-file-pdf"></i> Generar PDF</button>
        <a class="btn btn-gray btn-full" id="btnVerPDF" target="_blank" rel="noopener" style="display:none;"><i class="fas fa-up-right-from-square"></i> Ver PDF</a>
        <div id="mensajeGuardado" class="msg" style="display:none;margin-top:10px;"></div>
      </div>
    </section>
  </form>
</div>

<div class="bottom-actions">
  <button type="button" class="btn btn-gray" id="btnAnterior" onclick="pasoAnterior()">Anterior</button>
  <button type="button" class="btn btn-main" id="btnSiguiente" onclick="siguientePaso()">Siguiente</button>
</div>

<div class="modal-bg" id="selectorBg"><div class="modal"><h3 id="selectorTitulo"></h3><input class="selector-search" id="selectorBuscar" placeholder="Buscar..." oninput="filtrarSelector()"><div class="selector-list" id="selectorLista"></div><div class="modal-actions"><button class="btn btn-gray" onclick="cerrarSelector()">Cancelar</button></div></div></div>

<div class="modal-bg" id="modalMaterialBg"><div class="modal"><h3><i class="fas fa-box"></i> Agregar material</h3>
  <div class="form-group"><label>Categoría</label><input id="mat_categoria" class="selector" readonly onclick="abrirSelectorCategoria()" placeholder="Todas"></div>
  <div class="form-group"><label>Nombre material</label><input id="mat_nombre" class="selector" readonly onclick="abrirSelectorMaterialNombre()"></div>
  <div class="form-group"><label>Código material</label><input id="mat_codigo" class="selector" readonly onclick="abrirSelectorMaterialCodigo()"></div>
  <div class="form-row-2"><div class="form-group"><label>Unidad</label><input id="mat_unidad" readonly></div><div class="form-group"><label>Existencia actual</label><input id="mat_existencia" readonly></div></div>
  <div class="form-group"><label>Cantidad a trasladar</label><input type="number" id="mat_cantidad" min="1"></div>
  <div class="form-group"><label>Observaciones</label><textarea id="mat_observaciones" rows="2" readonly></textarea></div>
  <div class="form-group"><label>Imagen</label><div id="mat_imagen_box" class="firma-preview">Sin imagen disponible</div></div>
  <div class="modal-actions"><button class="btn btn-gray" onclick="cerrarModalMaterialTraslado()">Cancelar</button><button class="btn btn-main" onclick="agregarMaterialTraslado()">Agregar</button></div>
</div></div>

<div class="modal-bg" id="modalFirmaBg"><div class="modal"><h3 id="tituloFirma"></h3>
  <div class="form-group"><label id="labelNombreFirma">Nombre</label><input id="nombreFirma" placeholder="Escriba el nombre"></div>
  <div class="form-group"><label>Firma</label><canvas id="canvasFirma" class="signature-pad"></canvas></div>
  <div class="modal-actions"><button class="btn btn-gray" onclick="limpiarFirmaCanvas()">Limpiar</button><button class="btn btn-main" onclick="guardarFirmaModal()">Guardar firma</button></div>
  <div class="modal-actions"><button class="btn btn-red" onclick="cerrarModalFirma()">Cancelar</button></div>
</div></div>

<script src="traslados.js"></script>
</body>
</html>
