<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ODT - APP DIST</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>

  <style>
    :root {
      --bg-color:#0b141d;
      --card-color:#14212d;
      --accent-color:#003366;
      --success-color:#27ae60;
      --danger-color:#e74c3c;
      --text-color:#ffffff;
      --muted-text:#a0aec0;
      --border-color:#2c3e50;
      --blue-active:#3b82f6;
    }

    body {
      margin:0;
      font-family:'Segoe UI', Arial, sans-serif;
      background:var(--bg-color);
      color:var(--text-color);
    }

    header {
      background:var(--card-color);
      padding:12px 15px;
      display:flex;
      align-items:center;
      gap:10px;
      border-bottom:1px solid var(--border-color);
      position:sticky;
      top:0;
      z-index:20;
    }

    header h2 {
      margin:0;
      font-size:17px;
    }

    .btn-back-header {
      background:transparent;
      color:var(--muted-text);
      border:1px solid var(--border-color);
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    .container {
      padding:15px;
      padding-bottom:90px;
    }

    .steps-container {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:var(--card-color);
      padding:15px 10px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .step-indicator {
      flex:1;
      text-align:center;
      color:var(--muted-text);
      font-size:12px;
    }

    .step-circle {
      width:34px;
      height:34px;
      margin:0 auto 5px;
      border-radius:50%;
      border:2px solid var(--border-color);
      display:flex;
      justify-content:center;
      align-items:center;
      font-weight:bold;
    }

    .step-indicator.active .step-circle {
      border-color:var(--blue-active);
      background:var(--accent-color);
      color:white;
    }

    .step-indicator.active {
      color:var(--blue-active);
      font-weight:bold;
    }

    .step-content {
      display:none;
      background:var(--card-color);
      border-radius:12px;
      padding:18px 15px;
    }

    .step-content.activo {
      display:block;
    }

    h3 {
      margin-top:0;
      color:var(--blue-active);
      border-bottom:1px solid var(--border-color);
      padding-bottom:8px;
      font-size:16px;
    }

    .form-grid {
      display:grid;
      grid-template-columns:1fr;
      gap:15px;
    }

    @media(min-width:700px) {
      .form-grid {
        grid-template-columns:repeat(2,1fr);
      }
    }

    .form-row-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      grid-column:1 / -1;
    }

    @media(max-width:480px) {
      .form-row-2 {
        grid-template-columns:1fr 1fr;
        gap:10px;
      }
    }

    .form-group {
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .full-width {
      grid-column:1 / -1;
    }

    label {
      font-size:13px;
      color:var(--muted-text);
      font-weight:600;
    }

    input, select, textarea {
      width:100%;
      box-sizing:border-box;
      background:var(--bg-color);
      color:var(--text-color);
      border:1px solid var(--border-color);
      border-radius:8px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }

    input:focus, select:focus, textarea:focus {
      border-color:var(--blue-active);
    }

    input[readonly] {
      background:#080f15;
      color:var(--muted-text);
      opacity:0.85;
    }

    .btn-mini {
      background:var(--blue-active);
      color:white;
      border:none;
      border-radius:8px;
      padding:10px;
      font-weight:bold;
      cursor:pointer;
      margin-top:6px;
    }

    .btn-gps {
      background:#27ae60;
    }

    .material-card {
      background:var(--bg-color);
      border:1px solid var(--border-color);
      border-radius:10px;
      padding:12px;
      margin-bottom:12px;
    }

    .btn-add {
      background:var(--success-color);
      color:white;
      border:none;
      border-radius:8px;
      padding:12px;
      font-weight:bold;
      width:100%;
      margin:10px 0;
      cursor:pointer;
    }

    .btn-delete {
      background:transparent;
      color:var(--danger-color);
      border:1px solid var(--danger-color);
      border-radius:8px;
      padding:8px;
      cursor:pointer;
      margin-top:8px;
    }

    .form-actions {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:var(--card-color);
      border-top:1px solid var(--border-color);
      display:flex;
      gap:10px;
      padding:12px;
      z-index:100;
    }

    .btn-wizard {
      flex:1;
      border:none;
      border-radius:8px;
      padding:13px 10px;
      font-weight:bold;
      cursor:pointer;
      color:white;
    }

    .btn-back {
      background:#2c3e50;
    }

    .btn-next {
      background:var(--blue-active);
    }

    .btn-save {
      background:var(--success-color);
    }

    .modal-bg {
      display:none;
      position:fixed;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,.75);
      z-index:200;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal {
      background:var(--card-color);
      border:1px solid var(--border-color);
      border-radius:12px;
      padding:18px;
      width:100%;
      max-width:430px;
      max-height:85vh;
      overflow-y:auto;
    }

    .modal-actions {
      display:flex;
      gap:10px;
      margin-top:15px;
    }
  </style>
</head>

<body>

<header>
  <button class="btn-back-header" onclick="location.href='menu.html'">
    <i class="fas fa-arrow-left"></i>
  </button>
  <h2>ODT</h2>
</header>

<div class="container">

  <div class="steps-container">
    <div class="step-indicator active" id="ind-1">
      <div class="step-circle">1</div>
      ODT
    </div>
    <div class="step-indicator" id="ind-2">
      <div class="step-circle">2</div>
      Cuadrilla
    </div>
    <div class="step-indicator" id="ind-3">
      <div class="step-circle">3</div>
      Supervisor
    </div>
  </div>

  <form id="formODT">

    <div class="step-content activo" id="step-1">
      <h3><i class="fas fa-clipboard-list"></i> Datos Generales ODT</h3>

      <div class="form-grid">

        <div class="form-group">
          <label>ID</label>
          <input id="col_0" readonly>
        </div>

        <div class="form-group">
          <label>Usuario</label>
          <input id="col_1" readonly>
        </div>

        <div class="form-group">
          <label>Sector</label>
          <input id="col_2" readonly>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <input id="col_3" readonly>
        </div>

        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="col_4">
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label>Hora llegada</label>
            <input type="time" id="col_5">
          </div>

          <div class="form-group">
            <label>Hora finalizado</label>
            <input type="time" id="col_6">
          </div>
        </div>

        <div class="form-group">
          <label>Razón de Trabajo</label>
          <select id="col_7">
            <option value="">Seleccione...</option>
            <option value="INCIDENCIA">INCIDENCIA</option>
            <option value="MANTENIMIENTO">MANTENIMIENTO</option>
            <option value="OPERACIONES">OPERACIONES</option>
          </select>
        </div>

        <div class="form-group">
          <label>Reporte Energis</label>
          <input type="number" id="col_25" placeholder="Ingrese reporte Energis">
        </div>

        <div class="form-group full-width">
          <label>Trabajo Realizado</label>
          <textarea id="col_8" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Pintado Apoyo</label>
          <input type="number" id="col_9">
        </div>

        <div class="form-group">
          <label>Medidor</label>
          <input type="number" id="col_10">
        </div>

        <div class="form-group">
          <label>GPS</label>
          <input id="col_11" placeholder="Ej: 14.081800, -87.206800" onchange="convertirGpsManual()">
          <button type="button" class="btn-mini btn-gps" onclick="obtenerGPS()">
            <i class="fas fa-location-dot"></i> Obtener GPS
          </button>
        </div>

        <div class="form-group">
          <label>UTM</label>
          <input id="col_12" placeholder="Ej: 16N 477650 1556700" onchange="convertirUtmManual()">
        </div>

        <div class="form-group full-width">
          <button type="button" class="btn-mini" onclick="abrirModal('poste')">
            <i class="fas fa-bolt"></i> Datos Poste
          </button>

          <button type="button" class="btn-mini" onclick="abrirModal('transformador')">
            <i class="fas fa-charging-station"></i> Datos Transformador
          </button>
        </div>

      </div>
    </div>

    <div class="step-content" id="step-2">
      <h3><i class="fas fa-boxes-stacked"></i> Consumo Stock Cuadrilla</h3>

      <div id="listaCuadrilla"></div>

      <button type="button" class="btn-add" onclick="agregarMaterial('cuadrilla')">
        <i class="fas fa-plus"></i> Agregar Material Cuadrilla
      </button>
    </div>

    <div class="step-content" id="step-3">
      <h3><i class="fas fa-boxes-stacked"></i> Consumo Stock Supervisor</h3>

      <div id="listaSupervisor"></div>

      <button type="button" class="btn-add" onclick="agregarMaterial('supervisor')">
        <i class="fas fa-plus"></i> Agregar Material Supervisor
      </button>
    </div>

  </form>
</div>

<div class="form-actions">
  <button class="btn-wizard btn-back" id="btnAnterior" onclick="pasoAnterior()" type="button">Anterior</button>
  <button class="btn-wizard btn-next" id="btnSiguiente" onclick="siguientePaso()" type="button">Siguiente</button>
  <button class="btn-wizard btn-save" id="btnGuardar" onclick="guardarODT()" type="button" style="display:none;">Guardar</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitulo"></h3>
    <div id="modalContenido"></div>

    <div class="modal-actions">
      <button class="btn-wizard btn-back" type="button" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-wizard btn-save" type="button" onclick="cerrarModal()">Aceptar</button>
    </div>
  </div>
</div>

<script>
  let pasoActual = 1;
  const totalPasos = 3;

  document.addEventListener("DOMContentLoaded", function() {
    const usuario = sessionStorage.getItem("usuario");
    const sector = sessionStorage.getItem("sector");

    if (!usuario) {
      window.location.href = "index.html";
      return;
    }

    document.getElementById("col_0").value = generarID();
    document.getElementById("col_1").value = usuario;
    document.getElementById("col_2").value = sector;
    document.getElementById("col_3").value = "Pendiente";
    document.getElementById("col_4").value = fechaHoy();

    agregarMaterial("cuadrilla");
    agregarMaterial("supervisor");

    actualizarBotones();
  });

  function generarID() {
    const n = Math.floor(100000 + Math.random() * 900000);
    return "ODT-" + n;
  }

  function fechaHoy() {
    const hoy = new Date();
    return hoy.toISOString().split("T")[0];
  }

  function siguientePaso() {
    if (pasoActual < totalPasos) {
      document.getElementById("step-" + pasoActual).classList.remove("activo");
      document.getElementById("ind-" + pasoActual).classList.remove("active");

      pasoActual++;

      document.getElementById("step-" + pasoActual).classList.add("activo");
      document.getElementById("ind-" + pasoActual).classList.add("active");

      actualizarBotones();
    }
  }

  function pasoAnterior() {
    if (pasoActual > 1) {
      document.getElementById("step-" + pasoActual).classList.remove("activo");
      document.getElementById("ind-" + pasoActual).classList.remove("active");

      pasoActual--;

      document.getElementById("step-" + pasoActual).classList.add("activo");
      document.getElementById("ind-" + pasoActual).classList.add("active");

      actualizarBotones();
    }
  }

  function actualizarBotones() {
    document.getElementById("btnAnterior").style.display = pasoActual === 1 ? "none" : "block";
    document.getElementById("btnSiguiente").style.display = pasoActual === totalPasos ? "none" : "block";
    document.getElementById("btnGuardar").style.display = pasoActual === totalPasos ? "block" : "none";
  }

  function obtenerGPS() {
    if (!navigator.geolocation) {
      alert("GPS no disponible en este dispositivo.");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        document.getElementById("col_11").value = lat.toFixed(6) + ", " + lon.toFixed(6);
        document.getElementById("col_12").value = latLonToUTM(lat, lon);
      },
      function(error) {
        alert("No se pudo obtener la ubicación exacta. Active permisos de ubicación y GPS.");
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  }

  function convertirGpsManual() {
    const valor = document.getElementById("col_11").value.trim();

    if (!valor) {
      document.getElementById("col_12").value = "";
      return;
    }

    const partes = valor.split(",");

    if (partes.length !== 2) {
      alert("Formato GPS incorrecto. Use: latitud, longitud");
      document.getElementById("col_12").value = "";
      return;
    }

    const lat = parseFloat(partes[0]);
    const lon = parseFloat(partes[1]);

    if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
      alert("Coordenadas GPS inválidas.");
      document.getElementById("col_12").value = "";
      return;
    }

    document.getElementById("col_12").value = latLonToUTM(lat, lon);
  }

  function convertirUtmManual() {
    const valor = document.getElementById("col_12").value.trim().toUpperCase();

    if (!valor) {
      document.getElementById("col_11").value = "";
      return;
    }

    const partes = valor.split(/\s+/);

    if (partes.length !== 3) {
      alert("Formato UTM incorrecto. Use: 16N Este Norte");
      document.getElementById("col_11").value = "";
      return;
    }

    const zona = partes[0];
    const este = parseFloat(partes[1]);
    const norte = parseFloat(partes[2]);

    if (!/^\d{1,2}[NS]$/.test(zona) || isNaN(este) || isNaN(norte)) {
      alert("UTM inválido. Ejemplo correcto: 16N 477650 1556700");
      document.getElementById("col_11").value = "";
      return;
    }

    const resultado = utmToLatLon(zona, este, norte);

    document.getElementById("col_11").value = resultado.lat.toFixed(6) + ", " + resultado.lon.toFixed(6);
  }

  function latLonToUTM(lat, lon) {
    const a = 6378137;
    const f = 1 / 298.257223563;
    const k0 = 0.9996;

    const e = Math.sqrt(f * (2 - f));
    const zone = Math.floor((lon + 180) / 6) + 1;
    const lon0 = ((zone - 1) * 6 - 180 + 3) * Math.PI / 180;

    const latRad = lat * Math.PI / 180;
    const lonRad = lon * Math.PI / 180;

    const e2 = e * e;
    const ep2 = e2 / (1 - e2);

    const N = a / Math.sqrt(1 - e2 * Math.sin(latRad) ** 2);
    const T = Math.tan(latRad) ** 2;
    const C = ep2 * Math.cos(latRad) ** 2;
    const A = Math.cos(latRad) * (lonRad - lon0);

    const M = a * (
      (1 - e2 / 4 - 3 * e2 ** 2 / 64 - 5 * e2 ** 3 / 256) * latRad
      - (3 * e2 / 8 + 3 * e2 ** 2 / 32 + 45 * e2 ** 3 / 1024) * Math.sin(2 * latRad)
      + (15 * e2 ** 2 / 256 + 45 * e2 ** 3 / 1024) * Math.sin(4 * latRad)
      - (35 * e2 ** 3 / 3072) * Math.sin(6 * latRad)
    );

    let easting = k0 * N * (
      A + (1 - T + C) * A ** 3 / 6
      + (5 - 18 * T + T ** 2 + 72 * C - 58 * ep2) * A ** 5 / 120
    ) + 500000;

    let northing = k0 * (
      M + N * Math.tan(latRad) * (
        A ** 2 / 2
        + (5 - T + 9 * C + 4 * C ** 2) * A ** 4 / 24
        + (61 - 58 * T + T ** 2 + 600 * C - 330 * ep2) * A ** 6 / 720
      )
    );

    const hemisferio = lat >= 0 ? "N" : "S";

    if (lat < 0) {
      northing += 10000000;
    }

    return zone + hemisferio + " " + Math.round(easting) + " " + Math.round(northing);
  }

  function utmToLatLon(zona, easting, northing) {
    const a = 6378137;
    const f = 1 / 298.257223563;
    const k0 = 0.9996;

    const zoneNumber = parseInt(zona);
    const hemisphere = zona.slice(-1);

    const e = Math.sqrt(f * (2 - f));
    const e1sq = e * e / (1 - e * e);

    let x = easting - 500000;
    let y = northing;

    if (hemisphere === "S") {
      y -= 10000000;
    }

    const lonOrigin = (zoneNumber - 1) * 6 - 180 + 3;

    const M = y / k0;
    const mu = M / (a * (1 - e ** 2 / 4 - 3 * e ** 4 / 64 - 5 * e ** 6 / 256));

    const e1 = (1 - Math.sqrt(1 - e ** 2)) / (1 + Math.sqrt(1 - e ** 2));

    const J1 = 3 * e1 / 2 - 27 * e1 ** 3 / 32;
    const J2 = 21 * e1 ** 2 / 16 - 55 * e1 ** 4 / 32;
    const J3 = 151 * e1 ** 3 / 96;
    const J4 = 1097 * e1 ** 4 / 512;

    const fp = mu
      + J1 * Math.sin(2 * mu)
      + J2 * Math.sin(4 * mu)
      + J3 * Math.sin(6 * mu)
      + J4 * Math.sin(8 * mu);

    const C1 = e1sq * Math.cos(fp) ** 2;
    const T1 = Math.tan(fp) ** 2;
    const N1 = a / Math.sqrt(1 - e ** 2 * Math.sin(fp) ** 2);
    const R1 = a * (1 - e ** 2) / Math.pow(1 - e ** 2 * Math.sin(fp) ** 2, 1.5);
    const D = x / (N1 * k0);

    const lat = fp - (N1 * Math.tan(fp) / R1) * (
      D ** 2 / 2
      - (5 + 3 * T1 + 10 * C1 - 4 * C1 ** 2 - 9 * e1sq) * D ** 4 / 24
      + (61 + 90 * T1 + 298 * C1 + 45 * T1 ** 2 - 252 * e1sq - 3 * C1 ** 2) * D ** 6 / 720
    );

    const lon = (D
      - (1 + 2 * T1 + C1) * D ** 3 / 6
      + (5 - 2 * C1 + 28 * T1 - 3 * C1 ** 2 + 8 * e1sq + 24 * T1 ** 2) * D ** 5 / 120
    ) / Math.cos(fp);

    return {
      lat: lat * 180 / Math.PI,
      lon: lonOrigin + lon * 180 / Math.PI
    };
  }

  function abrirModal(tipo) {
    const titulo = document.getElementById("modalTitulo");
    const contenido = document.getElementById("modalContenido");

    if (tipo === "poste") {
      titulo.innerHTML = '<i class="fas fa-bolt"></i> Datos Poste';
      contenido.innerHTML = `
        ${campoModal("Material Altura", "col_13")}
        ${campoModal("Estructura Primaria", "col_14")}
        ${campoModal("Estructura Secundaria", "col_15")}
        ${campoModal("Retenida", "col_16")}
      `;
    }

    if (tipo === "transformador") {
      titulo.innerHTML = '<i class="fas fa-charging-station"></i> Datos Transformador';
      contenido.innerHTML = `
        ${campoModal("KVA/KV Nuevo", "col_17")}
        ${campoModal("Serie Nuevo", "col_18")}
        ${campoModal("PP Nuevo", "col_19")}
        ${campoModal("Marca Nuevo", "col_20")}
        ${campoModal("KVA/KV Retirado", "col_21")}
        ${campoModal("Serie Retirado", "col_22")}
        ${campoModal("PP Retirado", "col_23")}
        ${campoModal("Marca Retirado", "col_24")}
      `;
    }

    document.getElementById("modalBg").style.display = "flex";
  }

  function campoModal(label, id, type = "text") {
    const valor = document.getElementById(id) ? document.getElementById(id).value : "";

    return `
      <div class="form-group" style="margin-bottom:12px;">
        <label>${label}</label>
        <input type="${type}" id="${id}" value="${valor}">
      </div>
    `;
  }

  function cerrarModal() {
    document.getElementById("modalBg").style.display = "none";
  }

  function agregarMaterial(tipo) {
    const contenedor = tipo === "cuadrilla"
      ? document.getElementById("listaCuadrilla")
      : document.getElementById("listaSupervisor");

    const div = document.createElement("div");
    div.className = "material-card";

    div.innerHTML = `
      <div class="form-grid">
        <div class="form-group">
          <label>Código Material</label>
          <input class="codigo-material">
        </div>
        <div class="form-group">
          <label>Nombre Material</label>
          <input class="nombre-material">
        </div>
        <div class="form-group">
          <label>Unidad</label>
          <input class="unidad-material">
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" class="cantidad-material">
        </div>
      </div>

      <button type="button" class="btn-delete" onclick="this.parentElement.remove()">
        <i class="fas fa-trash"></i> Eliminar
      </button>
    `;

    contenedor.appendChild(div);
  }

  function obtenerMateriales(tipo) {
    const contenedor = tipo === "cuadrilla"
      ? document.querySelectorAll("#listaCuadrilla .material-card")
      : document.querySelectorAll("#listaSupervisor .material-card");

    const materiales = [];

    contenedor.forEach(card => {
      const codigo = card.querySelector(".codigo-material").value.trim();
      const nombre = card.querySelector(".nombre-material").value.trim();
      const unidad = card.querySelector(".unidad-material").value.trim();
      const cantidad = card.querySelector(".cantidad-material").value.trim();

      if (codigo || nombre || cantidad) {
        materiales.push({
          codigo: codigo,
          nombre: nombre,
          unidad: unidad,
          cantidad: cantidad
        });
      }
    });

    return materiales;
  }

  async function guardarODT() {
    const btn = document.getElementById("btnGuardar");

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

    convertirGpsManual();

    const odt = {};

    for (let i = 0; i <= 32; i++) {
      const campo = document.getElementById("col_" + i);
      odt["col_" + i] = campo ? campo.value : "";
    }

    const datos = {
      action: "guardarODT",
      odt: odt,
      consumo_cuadrilla: obtenerMateriales("cuadrilla"),
      consumo_supervisor: obtenerMateriales("supervisor")
    };

    try {
      const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
        method: "POST",
        mode: "cors",
        body: JSON.stringify(datos)
      });

      const data = await response.json();

      if (data.status === "Éxito") {
        alert("ODT guardada correctamente: " + data.id);
        window.location.href = "menu.html";
      } else {
        alert("Error: " + (data.message || "No se pudo guardar."));
      }

    } catch (error) {
      console.error(error);
      alert("Error de conexión al guardar.");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Guardar";
    }
  }
</script>
