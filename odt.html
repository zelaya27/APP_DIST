<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ODT - APP DIST</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="odt.css">
  <script src="config.js"></script>
</head>

<body>

<header>
  <button class="btn-back-header" onclick="volverMenuSeguro()">
    <i class="fas fa-arrow-left"></i>
  </button>
  <h2>ODT</h2>
</header>

<div class="container">

  <div class="steps-container">
    <div class="step-indicator active" id="ind-1">
      <div class="step-circle">1</div>
      ODT
    </div>

    <div class="step-indicator" id="ind-2">
      <div class="step-circle">2</div>
      Cuadrilla
    </div>

    <div class="step-indicator" id="ind-3">
      <div class="step-circle">3</div>
      Supervisor
    </div>
  </div>

  <form id="formODT">

    <div class="step-content activo" id="step-1">
      <h3><i class="fas fa-clipboard-list"></i> Datos Generales ODT</h3>

      <div class="form-grid">

        <div class="form-group">
          <label>ID</label>
          <input id="col_0" readonly>
        </div>

        <div class="form-group">
          <label>Usuario</label>
          <input id="col_1" readonly>
        </div>

        <input type="hidden" id="col_2">

        <div class="form-group">
          <label>Estado</label>
          <input id="col_3" readonly>
        </div>

        <div class="form-group">
          <label>Cuadrilla</label>
          <input id="col_4" class="campo-selector" readonly placeholder="Seleccione cuadrilla..." onclick="abrirSelectorCuadrilla()">
        </div>

        <div class="form-group">
          <label>Número Cuadrilla</label>
          <input id="col_34" readonly>
        </div>

        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="col_5">
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label>Hora llegada</label>
            <input type="time" id="col_6">
          </div>

          <div class="form-group">
            <label>Hora finalizado</label>
            <input type="time" id="col_7">
          </div>
        </div>

        <div class="form-group">
          <label>Razón de Trabajo</label>
          <input id="col_8" class="campo-selector" readonly placeholder="Seleccione..." onclick="abrirSelectorRazonTrabajo()">
        </div>

        <div class="form-group">
          <label>Reporte</label>
          <input type="number" id="col_26" placeholder="Ingrese reporte">
        </div>

        <div class="form-group full-width">
          <label>Trabajo Realizado</label>
          <textarea id="col_9" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Pintado Apoyo</label>
          <input type="number" id="col_10">
        </div>

        <div class="form-group">
          <label>Medidor</label>
          <input type="number" id="col_11">
        </div>

        <div class="form-group">
          <label>GPS</label>
          <input id="col_12" placeholder="Ej: 14.081800, -87.206800" onchange="convertirGpsManual()">

          <button type="button" class="btn-mini btn-gps" onclick="confirmarObtenerGPS()">
            <i class="fas fa-location-dot"></i> Obtener GPS
          </button>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label>UTM X</label>
            <input id="utm_x" placeholder="Ej: 477650" onchange="convertirUtmXYManual()">
          </div>

          <div class="form-group">
            <label>UTM Y</label>
            <input id="utm_y" placeholder="Ej: 1556700" onchange="convertirUtmXYManual()">
          </div>
        </div>

        <input type="hidden" id="col_13">

        <div class="form-group full-width">
          <button type="button" class="btn-mini btn-modal-action" onclick="abrirModal('poste')">
            <i class="fas fa-bolt"></i> Datos Poste
          </button>

          <button type="button" class="btn-mini btn-modal-action" onclick="abrirModal('transformador')">
            <i class="fas fa-charging-station"></i> Datos Transformador
          </button>
        </div>

      </div>
    </div>

    <div class="step-content" id="step-2">
      <h3><i class="fas fa-boxes-stacked"></i> Consumo Stock Cuadrilla</h3>

      <div id="listaCuadrilla"></div>

      <button type="button" class="btn-add" onclick="abrirModalMaterial('cuadrilla')">
        <i class="fas fa-plus"></i> Agregar Material Cuadrilla
      </button>
    </div>

    <div class="step-content" id="step-3">
      <h3><i class="fas fa-boxes-stacked"></i> Consumo Stock Supervisor</h3>

      <div id="listaSupervisor"></div>

      <button type="button" class="btn-add" onclick="abrirModalMaterial('supervisor')">
        <i class="fas fa-plus"></i> Agregar Material Supervisor
      </button>
    </div>

  </form>
</div>

<div class="form-actions">
  <button class="btn-wizard btn-back" id="btnAnterior" onclick="pasoAnterior()" type="button">Anterior</button>
  <button class="btn-wizard btn-next" id="btnSiguiente" onclick="siguientePaso()" type="button">Siguiente</button>
  <button class="btn-wizard btn-save" id="btnGuardar" onclick="guardarODT()" type="button" style="display:none;">Guardar</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitulo"></h3>
    <div id="modalContenido"></div>

    <div class="modal-actions">
      <button class="btn-wizard btn-back" type="button" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-wizard btn-save" type="button" onclick="cerrarModal()">Aceptar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalMaterialBg">
  <div class="modal">
    <h3 id="tituloModalMaterial">
      <i class="fas fa-box"></i> Agregar Material
    </h3>

    <div class="form-group">
      <label>Categoría</label>
      <input id="mat_categoria" class="campo-selector" readonly placeholder="Todas" onclick="abrirSelectorCategoriaMaterial()">
    </div>

    <div class="form-group">
      <label>Nombre Material</label>
      <input id="mat_nombre" class="campo-selector" readonly placeholder="Seleccione material..." onclick="abrirSelectorNombreMaterial()">
    </div>

    <div class="form-group">
      <label>Código Material</label>
      <input id="mat_codigo" class="campo-selector" readonly placeholder="Seleccione código..." onclick="abrirSelectorCodigoMaterial()">
    </div>

    <div class="form-group">
      <label>Unidad</label>
      <input id="mat_unidad" readonly>
    </div>

    <div class="form-group">
      <label>Existencia actual</label>
      <input id="mat_existencia" readonly>
    </div>

    <div class="form-group">
      <label>Cantidad a consumir</label>
      <input type="number" id="mat_cantidad">
    </div>

    <div class="modal-actions modal-actions-material">
      <button class="btn-wizard btn-back" type="button" onclick="cerrarModalMaterial()">Cancelar</button>
      <button class="btn-wizard btn-save" type="button" onclick="agregarMaterialDesdeModal()">Agregar</button>
    </div>

    <div class="form-group">
      <label>Observaciones</label>
      <textarea id="mat_observaciones" rows="2" readonly></textarea>
    </div>

    <div class="form-group">
      <label>Imagen</label>
      <div id="mat_imagen_box" style="background:#101b26;border:1px solid #3f5870;border-radius:8px;padding:10px;text-align:center;">
        Sin imagen disponible
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="selectorModalBg">
  <div class="selector-modal">
    <h3 id="selectorTitulo"><i class="fas fa-list"></i> Seleccionar</h3>

    <div class="selector-search-box">
      <i class="fas fa-search"></i>
      <input id="selectorBuscador" type="text" placeholder="Buscar..." autocomplete="off" oninput="filtrarSelectorGlobal()">
    </div>

    <div id="selectorLista" class="selector-lista"></div>

    <div class="modal-actions">
      <button class="btn-wizard btn-back" type="button" onclick="cerrarSelectorGlobal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="gps-utm.js"></script>
<script src="materiales.js"></script>
<script src="odt.js"></script>

</body>
</html>
