<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP DIST - Menú</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg-color: #0b141d;
      --card-color: #14212d;
      --accent-color: #003366;
      --success-color: #27ae60;
      --danger-color: #e74c3c;
      --text-color: #ffffff;
      --muted-text: #a0aec0;
      --border-color: #2c3e50;
      --blue-active: #3b82f6;
      --orange-active: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    header {
      background-color: var(--card-color);
      padding: 20px 15px 15px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-box {
      background: white;
      padding: 6px 12px;
      border-radius: 6px;
      display: inline-block;
    }

    .logo-box img {
      height: 45px;
      display: block;
    }

    .app-title {
      margin: 0;
      color: #ffffff;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .user-info {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 8px 15px;
      border-radius: 20px;
    }

    .info-item {
      font-size: 13px;
      color: var(--text-color);
    }

    .info-item span {
      color: var(--blue-active);
      font-weight: bold;
    }

    .btn-logout {
      background-color: transparent;
      color: var(--danger-color);
      border: 1px solid var(--danger-color);
      padding: 5px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .btn-logout:hover {
      background-color: var(--danger-color);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 15px;
    }

    .menu-title {
      text-align: center;
      color: var(--muted-text);
      font-size: 15px;
      margin-bottom: 25px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .menu-card {
      background-color: #1a2a3a;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 22px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
      min-height: 145px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .menu-card:hover,
    .menu-card:active {
      border-color: var(--blue-active);
      transform: translateY(-3px);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.35);
    }

    .menu-card.traslado:hover,
    .menu-card.traslado:active {
      border-color: var(--orange-active);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.35);
    }

    .menu-icon {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background-color: rgba(59, 130, 246, 0.12);
      color: var(--blue-active);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 13px auto;
      font-size: 28px;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .menu-card.traslado .menu-icon {
      background-color: rgba(245, 158, 11, 0.14);
      color: var(--orange-active);
      border-color: rgba(245, 158, 11, 0.45);
    }

    .menu-card h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: white;
    }

    .menu-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted-text);
      line-height: 1.35;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 380px) {
      .menu-grid { gap: 10px; }
      .menu-card { padding: 18px 8px; min-height: 132px; }
      .menu-icon { width: 54px; height: 54px; font-size: 24px; }
      .menu-card h3 { font-size: 16px; }
      .menu-card p { font-size: 12px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-box">
      <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo UTCD">
    </div>

    <h1 class="app-title">APP DIST</h1>

    <div class="user-info">
      <span class="info-item">
        <i class="fas fa-user-circle"></i>
        <span id="nombre-usuario">Usuario</span>
      </span>

      <span style="color: var(--border-color);">|</span>

      <span class="info-item">
        <i class="fas fa-map-marker-alt"></i>
        <span id="nombre-sector">Sector</span>
      </span>

      <span style="color: var(--border-color);">|</span>

      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="fas fa-sign-out-alt"></i> Salir
      </button>
    </div>
  </header>

  <div class="container">
    <div class="menu-title">
      Seleccione una opción para continuar
    </div>

    <div class="menu-grid">

      <div class="menu-card" onclick="abrirPantalla('listaodt.html')">
        <div class="menu-icon">
          <i class="fas fa-hard-hat"></i>
        </div>
        <h3>ODT</h3>
        <p>Consulta, PDF y creación de órdenes de trabajo.</p>
      </div>

      <div class="menu-card hidden" id="card-panel-odt" onclick="abrirPantalla('panelodt.html')">
        <div class="menu-icon">
          <i class="fas fa-desktop"></i>
        </div>
        <h3>PANEL ODT</h3>
        <p>Control, revisión y auditoría de ODT.</p>
      </div>

      <div class="menu-card traslado" onclick="abrirPantalla('listatraslados.html')">
        <div class="menu-icon">
          <i class="fas fa-right-left"></i>
        </div>
        <h3>TRASLADOS</h3>
        <p>Solicitudes y recepción de materiales.</p>
      </div>

      <div class="menu-card traslado hidden" id="card-panel-traslados" onclick="abrirPantalla('paneltraslados.html')">
        <div class="menu-icon">
          <i class="fas fa-chart-column"></i>
        </div>
        <h3>PANEL TRASL.</h3>
        <p>Control ENERGIS, PDF y auditoría.</p>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const usuario = sessionStorage.getItem("usuario");
      const tipoUsuario = String(sessionStorage.getItem("tipo_usuario") || "").trim();
      const sector = sessionStorage.getItem("sector");

      if (!usuario) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("nombre-usuario").innerText = usuario || "Usuario";
      document.getElementById("nombre-sector").innerText = sector || "Sector";

      // Paneles visibles solo para usuarios tipo 1 y 2.
      if (tipoUsuario === "1" || tipoUsuario === "2") {
        document.getElementById("card-panel-odt").classList.remove("hidden");
        document.getElementById("card-panel-traslados").classList.remove("hidden");
      }
    });

    function abrirPantalla(url) {
      window.location.href = url;
    }

    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
